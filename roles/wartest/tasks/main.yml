- name: Install python3 and docker SDK
  apt:
    name:
      - python3-pip
      - python3-docker
    state: present
    update_cache: yes

- name: Run wartest container
  docker_container:
    name: wartest
    image: "{{ image }}"
    ports:
      - "8081:8080"
    state: started
    restart_policy: always
